services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: virro
      POSTGRES_USER: virro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes: ["virro_pg:/var/lib/postgresql/data"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U virro"], interval: 5s, timeout: 5s, retries: 10}
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://virro:${POSTGRES_PASSWORD}@db:5432/virro
      VIRRO_TENANT_API_KEYS: ${VIRRO_TENANT_API_KEYS:?set VIRRO_TENANT_API_KEYS}
      VIRRO_FINGERPRINT_KEY: ${VIRRO_FINGERPRINT_KEY:?set VIRRO_FINGERPRINT_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://www.virro.app}
    ports: ["8000:8000"]
    depends_on: {db: {condition: service_healthy}}
volumes: {virro_pg: {}}
